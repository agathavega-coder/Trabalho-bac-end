<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio do Aluno</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  header {
    background: #1e40af;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    margin: 0;
    font-size: 20px;
  }

  nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    font-weight: bold;
  }

  nav a:hover {
    text-decoration: underline;
  }

  section {
    padding: 40px;
    text-align: center;
  }

  .btn {
    padding: 10px 20px;
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
  }

  footer {
    background: #020617;
    text-align: center;
    padding: 15px;
  }

  /* RESPONSIVO */
  @media (max-width: 600px) {
    header {
      flex-direction: column;
    }

    nav {
      margin-top: 10px;
    }
  }
</style>
